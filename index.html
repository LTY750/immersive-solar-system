<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#070d1c">
  <link rel="icon" href="data:,">
  <title>沉浸式太阳系运行模型</title>
  <style>
  :root {
    color-scheme: dark;
    --font-size-base: 15px;
    --background: #040713;
    --foreground: #e8eefc;
    --card: #070d1c;
    --card-foreground: #eef4ff;
    --popover: #11182a;
    --popover-foreground: #eef4ff;
    --primary: #f3f5fa;
    --primary-foreground: #111827;
    --secondary: #172036;
    --secondary-foreground: #e8eefc;
    --muted: #151d30;
    --muted-foreground: #aebbd3;
    --accent: #1e2b47;
    --accent-foreground: #f4f7ff;
    --border: #293653;
    --input: #334260;
    --ring: #8fb8ff;
    --viz-series-1: #ffd166;
    --viz-series-2: #58a9ff;
    --viz-series-3: #e7bc78;
    --viz-series-4: #d79a63;
    --viz-series-5: #f1735c;
    --viz-series-6: #7f91ff;
  }

  @media (prefers-color-scheme: light) {
    :root {
      color-scheme: light;
      --background: #edf3fb;
      --foreground: #162033;
      --card: #07101f;
      --card-foreground: #f2f6ff;
      --popover: #ffffff;
      --popover-foreground: #162033;
      --primary: #172033;
      --primary-foreground: #ffffff;
      --secondary: #dce6f4;
      --secondary-foreground: #162033;
      --muted: #dce5f2;
      --muted-foreground: #526178;
      --accent: #cddcf0;
      --accent-foreground: #162033;
      --border: #b9c8dc;
      --input: #aebfd6;
      --ring: #4d79be;
      --viz-series-1: #ffd166;
      --viz-series-2: #65b6ff;
      --viz-series-3: #e7bd7a;
      --viz-series-4: #d99c69;
      --viz-series-5: #ed715e;
      --viz-series-6: #8698ff;
    }
  }

  * {
    box-sizing: border-box;
  }

  html {
    background: var(--background);
    color: var(--foreground);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    font-size: var(--font-size-base);
  }

  body {
    margin: 0;
    min-width: 320px;
    min-height: 100vh;
    background:
      radial-gradient(circle at 12% 10%, color-mix(in srgb, var(--viz-series-6) 10%, transparent), transparent 34rem),
      radial-gradient(circle at 88% 88%, color-mix(in srgb, var(--viz-series-5) 8%, transparent), transparent 32rem),
      var(--background);
  }

  main {
    width: min(1240px, 100%);
    margin: 0 auto;
    padding: clamp(14px, 3vw, 36px);
  }

  button,
  input,
  select,
  output {
    font: inherit;
  }

  .card {
    overflow: hidden;
    background: var(--card);
    color: var(--card-foreground);
    border: 1px solid color-mix(in srgb, var(--border) 70%, transparent);
    border-radius: 18px;
    box-shadow: 0 22px 70px color-mix(in srgb, var(--background) 60%, transparent);
  }

  .viz-controls,
  .viz-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }

  .viz-controls {
    padding: 12px;
    background: color-mix(in srgb, var(--secondary) 54%, transparent);
    border: 1px solid color-mix(in srgb, var(--border) 66%, transparent);
    border-radius: 14px;
  }

  .btn {
    min-height: 38px;
    padding: 8px 14px;
    color: var(--secondary-foreground);
    background: var(--secondary);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
  }

  .btn:hover {
    background: var(--accent);
    color: var(--accent-foreground);
  }

  .btn:focus-visible,
  .form-range:focus-visible,
  .form-select:focus-visible {
    outline: 2px solid var(--ring);
    outline-offset: 2px;
  }

  .btn-primary {
    background: var(--primary);
    color: var(--primary-foreground);
    border-color: var(--primary);
  }

  .btn-ghost {
    background: transparent;
  }

  .form-label {
    display: grid;
    gap: 7px;
    color: var(--foreground);
    font-weight: 500;
  }

  .form-range {
    width: 100%;
    accent-color: var(--ring);
    cursor: pointer;
  }

  .form-select {
    width: 100%;
    min-height: 38px;
    padding: 7px 34px 7px 10px;
    color: var(--foreground);
    background: var(--background);
    border: 1px solid var(--input);
    border-radius: 9px;
  }

  .viz-badge {
    display: inline-flex;
    align-items: center;
    min-height: 28px;
    padding: 4px 9px;
    color: var(--primary-foreground);
    background: var(--primary);
    border-radius: 999px;
    font-weight: 500;
  }

  .text-small {
    font-size: 0.82rem;
  }

  .text-muted {
    color: var(--muted-foreground);
  }

  @media (max-width: 560px) {
    .viz-controls {
      padding: 10px;
    }

    .viz-controls > .btn {
      flex: 1 1 auto;
    }
  }

  html,
  body {
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  body.fullscreen-visual {
    min-width: 0;
    min-height: 0;
    margin: 0;
    padding: 0;
    background: var(--card);
  }

  body.fullscreen-visual main {
    width: 100%;
    max-width: none;
    height: 100%;
    margin: 0;
    padding: 0;
  }

  body.fullscreen-visual #solar-system-fullscreen {
    width: 100%;
    height: 100%;
  }

  body.fullscreen-visual #solar-system-fullscreen .rss-stage {
    width: 100%;
    height: 100%;
    min-height: 100%;
    max-height: none;
  }
</style>
</head>
<body class="fullscreen-visual">
  <main><div id="solar-system-fullscreen" aria-label="全屏沉浸式三维太阳系场景">
  <div class="rss-stage" id="rss-stage" role="img" aria-label="具有真实球体光照、公开行星纹理、土星环、星空和小行星带的三维太阳系。拖动可旋转，滚轮可缩放，点击行星会聚焦并显示介绍。">
    <div class="viz-row rss-hud" aria-label="运行控制">
      <button type="button" class="btn btn-primary" id="rss-play">暂停</button>
      <button type="button" class="btn" id="rss-speed-button">速度 1×</button>
      <button type="button" class="btn" id="rss-overview">返回全景</button>
    </div>

    <div class="viz-row rss-zoom-hud" aria-label="缩放控制">
      <button type="button" class="btn" id="rss-zoom-out">缩小</button>
      <button type="button" class="btn" id="rss-zoom-in">放大</button>
    </div>

    <div class="rss-loading" id="rss-loading" role="status">正在加载真实行星纹理…</div>
    <div class="viz-badge rss-floating-label" id="rss-floating-label" hidden>地球</div>
    <div class="rss-view-status text-small" id="rss-view-status" aria-hidden="true">拖动旋转 · 滚轮缩放 · 点击行星</div>
    <div class="text-destructive rss-error" id="rss-error" hidden></div>

    <aside class="card rss-info-overlay" id="rss-info-card" hidden aria-live="polite" aria-label="所选行星基本情况">
      <div class="viz-row rss-info-heading">
        <span class="rss-info-name" id="rss-info-name">地球</span>
        <span class="viz-badge" id="rss-info-type">类地行星</span>
        <button type="button" class="btn rss-close-info" id="rss-close-info">关闭</button>
      </div>

      <p class="rss-info-summary" id="rss-info-summary">地球是目前唯一已知拥有生命的天体。液态水、稳定的大气和磁场共同维持了适宜生命生存的环境。</p>

      <dl class="rss-facts">
        <div><dt class="text-small" id="rss-label-distance">距太阳</dt><dd id="rss-info-distance">1.00 AU</dd></div>
        <div><dt class="text-small" id="rss-label-diameter">直径</dt><dd id="rss-info-diameter">12,742 km</dd></div>
        <div><dt class="text-small" id="rss-label-gravity">表面引力</dt><dd id="rss-info-gravity">9.81 m/s²</dd></div>
        <div><dt class="text-small" id="rss-label-temperature">平均温度</dt><dd id="rss-info-temperature">约 15°C</dd></div>
        <div><dt class="text-small" id="rss-label-rotation">自转周期</dt><dd id="rss-info-rotation">23小时56分</dd></div>
        <div><dt class="text-small" id="rss-label-orbit">公转周期</dt><dd id="rss-info-orbit">365.3 天</dd></div>
        <div><dt class="text-small" id="rss-label-moons">天然卫星</dt><dd id="rss-info-moons">1 颗</dd></div>
      </dl>

      <div class="rss-atmosphere">
        <span class="text-small">大气组成</span>
        <span id="rss-info-atmosphere">约78%氮、21%氧，另有氩、二氧化碳和水汽。</span>
      </div>
    </aside>
  </div>
</div>

<style>
  #solar-system-fullscreen {
    width: 100%;
    color: var(--foreground);
  }

  #solar-system-fullscreen .rss-stage {
    position: relative;
    width: 100%;
    height: clamp(560px, 76vw, 780px);
    overflow: hidden;
    touch-action: none;
    background: var(--card);
  }

  #solar-system-fullscreen .rss-stage canvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: grab;
  }

  #solar-system-fullscreen .rss-stage canvas:active {
    cursor: grabbing;
  }

  #solar-system-fullscreen .rss-hud,
  #solar-system-fullscreen .rss-zoom-hud {
    position: absolute;
    top: 0.75rem;
    z-index: 4;
  }

  #solar-system-fullscreen .rss-hud {
    left: 0.75rem;
  }

  #solar-system-fullscreen .rss-zoom-hud {
    right: 0.75rem;
  }

  #solar-system-fullscreen .rss-loading,
  #solar-system-fullscreen .rss-error {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    pointer-events: none;
    z-index: 5;
    color: var(--card-foreground);
  }

  #solar-system-fullscreen .rss-loading[hidden],
  #solar-system-fullscreen .rss-error[hidden],
  #solar-system-fullscreen .rss-floating-label[hidden],
  #solar-system-fullscreen .rss-info-overlay[hidden] {
    display: none;
  }

  #solar-system-fullscreen .rss-view-status {
    position: absolute;
    right: 0.75rem;
    bottom: 0.75rem;
    color: var(--card-foreground);
    pointer-events: none;
    z-index: 2;
  }

  #solar-system-fullscreen .rss-floating-label {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, calc(-100% - 12px));
    pointer-events: none;
    z-index: 2;
  }

  #solar-system-fullscreen .rss-info-overlay {
    position: absolute;
    top: 4.75rem;
    right: 1rem;
    bottom: auto;
    left: auto;
    z-index: 4;
    width: min(27rem, calc(100% - 2rem));
    padding: 0.9rem 1rem 1rem;
    opacity: 0;
    pointer-events: none;
    transform: translateX(0.6rem);
    transition: opacity 180ms ease, transform 220ms ease;
    color-scheme: dark;
    background: color-mix(in srgb, Canvas 92%, transparent) !important;
    color: CanvasText !important;
    border-color: color-mix(in srgb, CanvasText 24%, transparent) !important;
  }

  #solar-system-fullscreen .rss-info-overlay.is-left {
    right: auto;
    left: 1rem;
    transform: translateX(-0.6rem);
  }

  #solar-system-fullscreen .rss-info-overlay.is-right {
    right: 1rem;
    left: auto;
    transform: translateX(0.6rem);
  }

  #solar-system-fullscreen .rss-info-overlay.is-visible {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(0);
  }

  #solar-system-fullscreen .rss-info-heading {
    align-items: center;
    flex-wrap: nowrap;
  }

  #solar-system-fullscreen .rss-info-name {
    font-weight: 500;
  }

  #solar-system-fullscreen .rss-info-overlay .rss-info-name,
  #solar-system-fullscreen .rss-info-overlay .rss-info-summary,
  #solar-system-fullscreen .rss-info-overlay .rss-facts dd,
  #solar-system-fullscreen .rss-info-overlay #rss-info-atmosphere {
    color: CanvasText !important;
  }

  #solar-system-fullscreen .rss-info-overlay #rss-info-type {
    color: CanvasText !important;
    background: color-mix(in srgb, CanvasText 14%, Canvas) !important;
  }

  #solar-system-fullscreen .rss-close-info {
    margin-left: auto;
  }

  #solar-system-fullscreen .rss-info-summary {
    margin: 0.7rem 0;
  }

  #solar-system-fullscreen .rss-facts {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 0.6rem 0.75rem;
    margin: 0;
  }

  #solar-system-fullscreen .rss-facts div {
    min-width: 0;
  }

  #solar-system-fullscreen .rss-facts dt,
  #solar-system-fullscreen .rss-atmosphere .text-small {
    color: color-mix(in srgb, CanvasText 78%, transparent) !important;
  }

  #solar-system-fullscreen .rss-facts dd {
    margin: 0.3rem 0 0;
    color: var(--card-foreground);
    font-weight: 500;
    overflow-wrap: anywhere;
  }

  #solar-system-fullscreen .rss-atmosphere {
    display: grid;
    gap: 0.3rem;
    margin-top: 0.7rem;
    padding-top: 0.6rem;
    border-top: 1px solid var(--border);
    color: var(--card-foreground);
  }

  @media (max-height: 560px) and (min-width: 561px) {
    #solar-system-fullscreen .rss-info-overlay {
      top: 4rem;
      padding: 0.65rem 0.8rem 0.75rem;
    }

    #solar-system-fullscreen .rss-info-summary {
      margin: 0.45rem 0;
    }

    #solar-system-fullscreen .rss-facts {
      gap: 0.4rem 0.6rem;
    }

    #solar-system-fullscreen .rss-facts dd {
      margin-top: 0.15rem;
    }

    #solar-system-fullscreen .rss-atmosphere {
      gap: 0.2rem;
      margin-top: 0.45rem;
      padding-top: 0.4rem;
    }
  }

  @media (max-width: 560px) {
    #solar-system-fullscreen .rss-stage {
      height: 660px;
    }

    #solar-system-fullscreen .rss-hud {
      right: 0.75rem;
    }

    #solar-system-fullscreen .rss-zoom-hud {
      top: 3.75rem;
    }

    #solar-system-fullscreen .rss-view-status {
      display: none;
    }

    #solar-system-fullscreen .rss-info-overlay,
    #solar-system-fullscreen .rss-info-overlay.is-left,
    #solar-system-fullscreen .rss-info-overlay.is-right {
      top: auto;
      right: auto;
      left: 0.5rem;
      bottom: 0.5rem;
      width: calc(100% - 1rem);
      padding: 0.75rem 0.8rem 0.85rem;
      transform: translateY(0.6rem);
    }

    #solar-system-fullscreen .rss-info-overlay.is-visible {
      transform: translateY(0);
    }

    #solar-system-fullscreen .rss-facts {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    #solar-system-fullscreen .rss-info-heading {
      flex-wrap: wrap;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    #solar-system-fullscreen .rss-info-overlay {
      transition: none;
    }
  }
</style>

  try {

    const planetData = [
      { id: 'mercury', name: '水星', type: '类地行星', au: 0.39, days: 88.0, diameter: 4879, moons: 0, gravity: '3.70 m/s²', temperature: '约 167°C', rotation: '58.6 地球日', atmosphereText: '几乎没有大气，只有由氧、钠、氢、氦和钾构成的稀薄外逸层。', summary: '水星是距太阳最近、体积最小的行星。它昼夜温差极大，表面布满由撞击形成的环形山。', orbit: 10, size: 0.72, phase: 4.75, inclination: 7.0, tilt: 0.03, spin: 0.10, texture: 'mercury' },
      { id: 'venus', name: '金星', type: '类地行星', au: 0.72, days: 224.7, diameter: 12104, moons: 0, gravity: '8.87 m/s²', temperature: '约 464°C', rotation: '243 地球日（逆向）', atmosphereText: '约96.5%二氧化碳、3.5%氮，浓厚的硫酸云层覆盖全球。', summary: '金星大小接近地球，却拥有失控的温室效应，是太阳系表面温度最高的行星。', orbit: 14, size: 1.25, phase: 3.65, inclination: 3.4, tilt: 177.4, spin: -0.04, texture: 'venus', atmosphere: 0xe5b96f },

      infoTemperature.textContent = planet.temperature;
      infoRotation.textContent = planet.rotation;
      infoOrbit.textContent = isSun ? planet.orbitText : `${formatNumber(planet.days)} 天`;
      infoMoons.textContent = isSun ? planet.moonsText : `${planet.moons} 颗`;
      infoAtmosphere.textContent = planet.atmosphereText;
      planetObjects.forEach(({ orbitLine }, id) => {
        orbitLine.material.opacity = id === selectedId ? 0.62 : 0.18;
        orbitLine.material.color.setHex(id === selectedId ? 0x8fb8ff : 0x6f82a8);
      });
    };

    const showInfoCard = () => {
      infoVisible = true;
      infoCard.hidden = false;
      if (reduceMotion) {
        infoCard.classList.add('is-visible');
        return;
      }
      requestAnimationFrame(() => {
        if (infoVisible) infoCard.classList.add('is-visible');
      });
    };

    const hideInfoCard = () => {
      infoVisible = false;
      infoCard.classList.remove('is-visible');
      floatingLabel.hidden = true;
      if (reduceMotion) {
        infoCard.hidden = true;
        return;
      }
      setTimeout(() => {
        if (!infoVisible) infoCard.hidden = true;
      }, 230);
    };

    const focusPlanet = (id) => {
      const item = getFocusItem(id);
      if (!item) return;
      setDetail(item.planet);
      focusId = id;
      const focusProjection = item.group.position.clone().project(camera);
      panelSide = focusProjection.x > 0.1 ? 'left' : 'right';
      infoCard.classList.toggle('is-left', panelSide === 'left');
      infoCard.classList.toggle('is-right', panelSide === 'right');
      if (id !== 'sun') {
        const sunward = item.group.position.clone().multiplyScalar(-1);
        cameraState.theta = Math.atan2(sunward.x, sunward.z) + 0.18;
      }
      cameraState.phi = 1.12;
      cameraState.desiredRadius = Math.max(10, item.planet.size * (item.planet.rings ? 7 : 5));
      showInfoCard();
      viewStatus.textContent = `${item.planet.name}近景`;
    };

    const showOverview = () => {
      focusId = null;
      cameraState.desiredTarget.set(0, 0, 0);
      cameraState.desiredRadius = overviewRadius();
      cameraState.phi = 1.02;
      viewStatus.textContent = infoVisible ? `${getFocusItem(selectedId).planet.name} · 全景` : '拖动旋转 · 滚轮缩放 · 点击行星';
    };

    const updateRunState = () => {
      playButton.textContent = running ? '暂停' : '继续';
      playButton.classList.toggle('btn-primary', running);
    };

    const resize = () => {
      const bounds = stage.getBoundingClientRect();
      const width = Math.max(1, bounds.width);
      const height = Math.max(1, bounds.height);
      renderer.setSize(width, height, false);
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      if (!focusId) cameraState.desiredRadius = overviewRadius();
    };

    const updateLabel = () => {
      const selected = getFocusItem(selectedId);
      if (!selected) {
        floatingLabel.hidden = true;
        return;
      }
      selected.group.getWorldPosition(worldPosition);
      projected.copy(worldPosition).project(camera);
      const screenX = (projected.x * 0.5 + 0.5) * stage.clientWidth;
      const screenY = (-projected.y * 0.5 + 0.5) * stage.clientHeight;
      const distance = camera.position.distanceTo(worldPosition);
      const visibleHeight = 2 * Math.tan(toRadians(camera.fov) / 2) * distance;
      let effectiveRadius = selected.planet.size;
      if (selected.planet.rings) effectiveRadius *= 2.3;
      if (selected.planet.faintRings) effectiveRadius *= 1.88;
      const radiusPixels = effectiveRadius / Math.max(0.01, visibleHeight) * stage.clientHeight;
      const labelTop = screenY - Math.max(14, radiusPixels);
      const minimumLabelTop = stage.clientWidth <= 560 ? 126 : 54;
      const visible = infoVisible
        && projected.z > -1
        && projected.z < 1
        && Math.abs(projected.x) < 1.08
        && Math.abs(projected.y) < 1.08
        && labelTop > minimumLabelTop;
      floatingLabel.hidden = !visible;
      if (!visible) return;
      floatingLabel.style.left = `${screenX}px`;
      floatingLabel.style.top = `${labelTop}px`;
    };

    playButton.addEventListener('click', () => {
      running = !running;
      previousTime = performance.now();
      updateRunState();
    });

    speedButton.addEventListener('click', () => {
      const speeds = [0.5, 1, 2, 4];
      const current = speeds.indexOf(speed);
      speed = speeds[(current + 1) % speeds.length];
      speedButton.textContent = `速度 ${speed}×`;
    });

    zoomOutButton.addEventListener('click', () => {
      cameraState.desiredRadius = clamp(cameraState.desiredRadius * 1.25, 10, 360);
    });

    zoomInButton.addEventListener('click', () => {
      cameraState.desiredRadius = clamp(cameraState.desiredRadius / 1.25, 10, 360);
    });

    overviewButton.addEventListener('click', showOverview);
    closeInfoButton.addEventListener('click', () => {
      hideInfoCard();
      viewStatus.textContent = focusId ? `${getFocusItem(selectedId).planet.name}近景` : '拖动旋转 · 滚轮缩放 · 点击行星';
    });

    renderer.domElement.addEventListener('wheel', (event) => {
      event.preventDefault();
      cameraState.desiredRadius = clamp(cameraState.desiredRadius * Math.exp(event.deltaY * 0.0013), 10, 360);
    }, { passive: false });

    renderer.domElement.addEventListener('pointerdown', (event) => {
      drag = { id: event.pointerId, x: event.clientX, y: event.clientY, startX: event.clientX, startY: event.clientY, moved: false };
      renderer.domElement.setPointerCapture(event.pointerId);
    });

    renderer.domElement.addEventListener('pointermove', (event) => {
      if (!drag || drag.id !== event.pointerId) return;
      const deltaX = event.clientX - drag.x;
      const deltaY = event.clientY - drag.y;
      if (Math.hypot(event.clientX - drag.startX, event.clientY - drag.startY) > 5) drag.moved = true;
      cameraState.theta -= deltaX * 0.006;
      cameraState.phi = clamp(cameraState.phi + deltaY * 0.005, 0.18, Math.PI - 0.18);
      drag.x = event.clientX;
      drag.y = event.clientY;
    });

    const finishPointer = (event) => {
      if (!drag || drag.id !== event.pointerId) return;
      if (!drag.moved) {
        const bounds = renderer.domElement.getBoundingClientRect();
        pointer.x = ((event.clientX - bounds.left) / bounds.width) * 2 - 1;
        pointer.y = -((event.clientY - bounds.top) / bounds.height) * 2 + 1;
        raycaster.setFromCamera(pointer, camera);
        const hit = raycaster.intersectObjects(clickableMeshes, false)[0];
        if (hit && hit.object.userData.planetId) focusPlanet(hit.object.userData.planetId);
      }
      drag = null;
    };

    renderer.domElement.addEventListener('pointerup', finishPointer);
    renderer.domElement.addEventListener('pointercancel', finishPointer);

    const updatePlanets = (delta) => {
      planetObjects.forEach((item) => {
        const periodFactor = Math.pow(item.planet.days / 365.3, 0.42);
        if (running) item.angle += delta * 0.34 * speed / periodFactor;
        const inclination = toRadians(item.planet.inclination);
        item.group.position.set(
          Math.cos(item.angle) * item.planet.orbit,
          0,
          Math.sin(item.angle) * item.planet.orbit
        );
        item.group.position.applyAxisAngle(orbitAxis, inclination);
        if (running) item.mesh.rotation.y += delta * item.planet.spin * speed;
        if (item.group.userData.moonPivot && running) item.group.userData.moonPivot.rotation.y += delta * 0.92 * speed;
      });
      if (running) {
        sun.rotation.y += delta * 0.07 * speed;
        asteroidBelt.rotation.y += delta * 0.008 * speed;
      }
    };

    const updateCamera = (delta) => {
      if (focusId) {
        const focused = getFocusItem(focusId);
        if (focused) {
          cameraState.desiredTarget.copy(focused.group.position);
          if (infoVisible && stage.clientWidth > 560) {
            camera.getWorldDirection(cameraDirection);
            cameraRight.crossVectors(cameraDirection, camera.up).normalize();
            const compositionShift = Math.min(cameraState.desiredRadius * 0.18, 8);
            cameraState.desiredTarget.addScaledVector(cameraRight, panelSide === 'right' ? compositionShift : -compositionShift);
          }
        }
      } else {
        cameraState.desiredTarget.set(0, 0, 0);
      }
      const easing = 1 - Math.exp(-Math.max(0.001, delta) * 5.2);
      cameraState.target.lerp(cameraState.desiredTarget, easing);
      cameraState.radius = mix(cameraState.radius, cameraState.desiredRadius, easing);
      const sinePhi = Math.sin(cameraState.phi);
      camera.position.set(
        cameraState.target.x + cameraState.radius * sinePhi * Math.sin(cameraState.theta),
        cameraState.target.y + cameraState.radius * Math.cos(cameraState.phi),
        cameraState.target.z + cameraState.radius * sinePhi * Math.cos(cameraState.theta)
      );
      camera.lookAt(cameraState.target);
    };

    const animate = (time) => {
      if (!root.isConnected) {
        renderer.setAnimationLoop(null);
        return;
      }
      const delta = Math.min(0.05, Math.max(0, (time - previousTime) / 1000));
      previousTime = time;
      updatePlanets(delta);
      updateCamera(delta);
      updateLabel();
      renderer.render(scene, camera);
    };

    setDetail(planetData.find((planet) => planet.id === 'earth'));
    showOverview();
    infoVisible = false;
    infoCard.classList.remove('is-visible');
    infoCard.hidden = true;
    updateRunState();
    const resizeObserver = new ResizeObserver(resize);
    resizeObserver.observe(stage);
    resize();
    loading.hidden = true;
    document.addEventListener('visibilitychange', () => {
      previousTime = performance.now();
    });
    renderer.setAnimationLoop(animate);
  } catch (error) {
    console.error(error);
    loading.hidden = true;
    errorBox.hidden = false;
    errorBox.textContent = '三维场景加载失败，请联网后重试';
  }
})();
</script>
</main>
</body>
</html>
